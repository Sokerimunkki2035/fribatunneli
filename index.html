<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fribatunneli AI - Rysty Analysaattori</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { font-family: sans-serif; background: #0b0f14; color: #e9eef5; margin: 0; padding: 10px; text-align: center; }
    .container { max-width: 800px; margin: auto; }
    #canvas-container { position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-top: 10px; border: 2px solid #2a3a55; }
    canvas { width: 100%; display: block; }
    video { display: none; } 
    
    .ui-panel { background: #172235; padding: 15px; border-radius: 15px; margin-top: 15px; display: grid; grid-template-columns: 1fr; gap: 10px; }
    .stat-box { background: #0f1722; padding: 15px; border-radius: 10px; border: 1px solid #2a3a55; text-align: left; }
    .stat-value { font-size: 18px; font-weight: bold; color: #00aaff; display: block; margin-top: 5px; }
    .warning { color: #ff4444 !important; border-color: #ff4444 !important; }
    .instruction { font-size: 14px; color: #ffcc00; margin-top: 5px; font-style: italic; }

    .controls { background: #172235; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button, input[type="file"], select { background: #2a3a55; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
    input[type="range"] { width: 100%; margin-top: 10px; }
    .label { font-size: 11px; opacity: 0.7; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <h2>Fribatunneli AI - Rysty Analyysi</h2>
  <input type="file" id="upload" accept="video/*">

  <div id="canvas-container">
    <video id="video-input" playsinline muted></video>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button id="btn-play">PLAY</button>
      <button id="btn-pause">PAUSE</button>
      <button id="btn-stop">RESET</button>
      <select id="speed-select">
        <option value="0.2">0.2x (Suositus)</option>
        <option value="1">1x</option>
      </select>
    </div>
    <input type="range" id="seek-bar" value="0" step="0.1">
  </div>

  <div class="ui-panel">
    <div id="pocket-box" class="stat-box">
      <span class="label">Veto-linja (Pocket)</span>
      <span id="pocket-status" class="stat-value">Etsitään heittoa...</span>
      <div id="pocket-instruction" class="instruction"></div>
    </div>

    <div class="stat-box">
      <span class="label">Painonsiirto (Takajalka -> Etujalka)</span>
      <span id="weight-status" class="stat-value">OK</span>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video-input');
const canvas = document.getElementById('output-canvas');
const upload = document.getElementById('upload');
const speedSelect = document.getElementById('speed-select');
const seekBar = document.getElementById('seek-bar');

const pocketStatus = document.getElementById('pocket-status');
const pocketInstruction = document.getElementById('pocket-instruction');
const pocketBox = document.getElementById('pocket-box');
const weightStatus = document.getElementById('weight-status');

const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');

const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

let isBackhand = true; // Asetetaan rystyheitto oletukseksi

pose.onResults((results) => {
  const canvasCtx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00aaff', lineWidth: 4});
    
    // Nivelet oikealle puolelle (oikeakätinen heittäjä)
    const s = results.poseLandmarks[12]; // Olkapää
    const e = results.poseLandmarks[14]; // Kyynärpää
    const w = results.poseLandmarks[16]; // Ranne
    const hipR = results.poseLandmarks[24]; // Oikea lantio
    const hipL = results.poseLandmarks[23]; // Vasen lantio

    if (s && e && w && hipR && hipL) {
      if (isBackhand) {
        // RYSTYHEITON ANALYYSI

        // 1. Rounding vs. Pocket (Veto-linja)
        // Kun ranne (w) on kauempana vartalosta kuin kyynärpää (e) vedon alussa, se on rounding.
        const roundingDiff = w.x - e.x;
        
        if (roundingDiff < -0.05) { // Oikeakätinen: ranne x-akselilla reilusti vasemmalle kyynärpäästä
          pocketStatus.innerText = "VIRHE: ROUNDING";
          pocketBox.classList.add('warning');
          pocketInstruction.innerText = "KORJAUS: Tuo kiekko suorassa linjassa rinnan edestä ('the pocket'). Pidä ranne suorana.";
        } else {
          pocketStatus.innerText = "VEDO-LINJA OK";
          pocketBox.classList.remove('warning');
          pocketInstruction.innerText = "";
        }

        // 2. Painonsiirto (Lantion asento suhteessa etujalkaan)
        // Kun lantion painopiste (keskikohta hipR ja hipL välillä) siirtyy etujalan puolelle, paino on siirtynyt.
        const hipCenterY = (hipR.y + hipL.y) / 2;
        const braceFootY = hipR.y; // Yksinkertaistus: brace foot on heittäjän oikea jalka

        if (hipCenterY < braceFootY - 0.05) { 
          weightStatus.innerText = "PAINO TAKANA";
          weightStatus.className = "";
        } else {
          weightStatus.innerText = "PAINO ETUJALALLA (OK)";
          weightStatus.className = "stat-value OK";
        }
      }
    }
  }
  canvasCtx.restore();
});

upload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    video.src = URL.createObjectURL(file);
    video.onloadedmetadata = () => { seekBar.max = video.duration; };
    video.playbackRate = parseFloat(speedSelect.value);
  }
});

btnPlay.addEventListener('click', () => video.play());
btnPause.addEventListener('click', () => video.pause());
btnStop.addEventListener('click', () => { video.pause(); video.currentTime = 0; });
speedSelect.addEventListener('change', (e) => { video.playbackRate = parseFloat(e.target.value); });
video.addEventListener('timeupdate', () => { seekBar.value = video.currentTime; });
seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });

async function run() {
  if (!video.paused || video.readyState > 2) await pose.send({image: video});
  requestAnimationFrame(run);
}
run();
</script>
</body>
</html>
