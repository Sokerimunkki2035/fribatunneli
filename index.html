<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fribatunneli AI - Pro Coach</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { font-family: sans-serif; background: #0b0f14; color: #e9eef5; margin: 0; padding: 10px; text-align: center; }
    .container { max-width: 800px; margin: auto; }
    #canvas-container { position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-top: 10px; border: 2px solid #2a3a55; }
    canvas { width: 100%; display: block; }
    video { display: none; } 
    
    .ui-panel { background: #172235; padding: 15px; border-radius: 15px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: #0f1722; padding: 10px; border-radius: 10px; border: 1px solid #2a3a55; text-align: left; }
    .stat-value { font-size: 15px; font-weight: bold; color: #00aaff; display: block; margin-top: 5px; }
    .warning { color: #ff4444 !important; border-color: #ff4444 !important; }
    .instruction { font-size: 11px; color: #ffcc00; margin-top: 5px; font-style: italic; }

    .controls { background: #172235; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button, input[type="file"], select { background: #2a3a55; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
    button.active { background: #00aaff; }
    input[type="range"] { width: 100%; margin-top: 10px; }
    .label { font-size: 10px; opacity: 0.7; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <h3>Fribatunneli AI</h3>
  <input type="file" id="upload" accept="video/*">

  <div id="canvas-container">
    <video id="video-input" playsinline muted></video>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button id="mode-bh" class="active">RYSTY (BH)</button>
      <button id="mode-fh">KÄMMEN (FH)</button>
    </div>
    <div class="btn-row">
      <button id="btn-play">PLAY</button>
      <button id="btn-pause">PAUSE</button>
      <select id="speed-select">
        <option value="0.05">0.05x (Superhidastus)</option>
        <option value="0.2">0.2x</option>
        <option value="1">1x</option>
      </select>
    </div>
    <input type="range" id="seek-bar" value="0" step="0.01">
  </div>

  <div class="ui-panel">
    <div class="stat-box" id="box-line">
      <span class="label">Veto-linja (Dippi)</span>
      <span id="line-status" class="stat-value">OK</span>
      <div id="line-instr" class="instruction"></div>
    </div>
    <div class="stat-box" id="box-release">
      <span class="label">Irrotus (Early Release)</span>
      <span id="release-status" class="stat-value">OK</span>
      <div id="release-instr" class="instruction"></div>
    </div>
    <div class="stat-box" id="box-angle">
      <span class="label">Kiekon kulma (Hyzer)</span>
      <span id="angle-status" class="stat-value">OK</span>
    </div>
    <div class="stat-box" id="box-nose">
      <span class="label">Nose Up / Down</span>
      <span id="nose-status" class="stat-value">OK</span>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video-input');
const canvas = document.getElementById('output-canvas');
const upload = document.getElementById('upload');
const speedSelect = document.getElementById('speed-select');
const seekBar = document.getElementById('seek-bar');

let currentMode = 'BH';
const lineStatus = document.getElementById('line-status');
const lineInstr = document.getElementById('line-instr');
const releaseStatus = document.getElementById('release-status');
const releaseInstr = document.getElementById('release-instr');
const angleStatus = document.getElementById('angle-status');
const noseStatus = document.getElementById('nose-status');

const btnBH = document.getElementById('mode-bh');
const btnFH = document.getElementById('mode-fh');

btnBH.onclick = () => { currentMode = 'BH'; btnBH.classList.add('active'); btnFH.classList.remove('active'); };
btnFH.onclick = () => { currentMode = 'FH'; btnFH.classList.add('active'); btnBH.classList.remove('active'); };

const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults((results) => {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00aaff', lineWidth: 4});
    
    const sR = results.poseLandmarks[12]; // Oikea olka
    const sL = results.poseLandmarks[11]; // Vasen olka
    const e = results.poseLandmarks[14];  // Kyynärpää
    const w = results.poseLandmarks[16];  // Ranne

    if (sR && e && w) {
      // 1. DIP ANALYYSI
      if (w.y > sR.y + 0.22) {
        lineStatus.innerText = "VIRHE: DIPPI";
        lineInstr.innerText = "Pidä veto rinnan korkeudella.";
      } else {
        lineStatus.innerText = "SUORA VETO"; lineInstr.innerText = "";
      }

      // 2. EARLY RELEASE ANALYYSI (Leveä veto)
      // Lasketaan ranteen etäisyys olkapäiden välisestä linjasta x-suunnassa
      const shoulderWidth = Math.abs(sR.x - sL.x);
      const handDistance = Math.abs(w.x - sR.x);

      if (currentMode === 'BH' && handDistance > shoulderWidth * 1.5) {
        releaseStatus.innerText = "EARLY RELEASE VAARA";
        releaseStatus.classList.add('warning');
        releaseInstr.innerText = "Veto karkaa leveäksi. Tuo kiekko lähemmäs rintaa (Pocket).";
      } else {
        releaseStatus.innerText = "OK";
        releaseStatus.classList.remove('warning');
        releaseInstr.innerText = "";
      }

      // 3. HYZER ANALYYSI
      if (currentMode === 'BH') {
        if (w.y > e.y + 0.07) { angleStatus.innerText = "LIIAN HYZER"; }
        else { angleStatus.innerText = "FLÄTTI / OK"; }
      } else {
        if (w.y < e.y - 0.04) { angleStatus.innerText = "PALM ROLL!"; }
        else { angleStatus.innerText = "FH OK"; }
      }

      // 4. NOSE UP
      if (w.y < e.y - 0.02) {
        noseStatus.innerText = "NOSE UP";
        noseStatus.classList.add('warning');
      } else {
        noseStatus.innerText = "NOSE OK";
        noseStatus.classList.remove('warning');
      }
    }
  }
  ctx.restore();
});

upload.onchange = (e) => { 
    video.src = URL.createObjectURL(e.target.files[0]); 
    video.onloadedmetadata = () => { 
        seekBar.max = video.duration; 
        video.playbackRate = parseFloat(speedSelect.value);
    }; 
};
document.getElementById('btn-play').onclick = () => video.play();
document.getElementById('btn-pause').onclick = () => video.pause();
speedSelect.onchange = (e) => { video.playbackRate = parseFloat(e.target.value); };
video.ontimeupdate = () => { seekBar.value = video.currentTime; };
seekBar.oninput = () => { video.currentTime = seekBar.value; };

async function run() { if (!video.paused || video.readyState > 2) await pose.send({image: video}); requestAnimationFrame(run); }
run();
</script>
</body>
</html>
