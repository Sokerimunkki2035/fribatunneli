<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fribatunneli AI - Virheen tunnistus</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { font-family: sans-serif; background: #0b0f14; color: #e9eef5; margin: 0; padding: 10px; text-align: center; }
    .container { max-width: 800px; margin: auto; }
    #canvas-container { position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-top: 10px; border: 2px solid #2a3a55; }
    canvas { width: 100%; display: block; }
    video { display: none; } 
    
    .ui-panel { background: #172235; padding: 15px; border-radius: 15px; margin-top: 15px; display: grid; grid-template-columns: 1fr; gap: 10px; }
    .stat-box { background: #0f1722; padding: 15px; border-radius: 10px; border: 1px solid #2a3a55; text-align: left; }
    .stat-value { font-size: 18px; font-weight: bold; color: #00aaff; display: block; margin-top: 5px; }
    .warning { color: #ff4444 !important; border-color: #ff4444 !important; }
    .instruction { font-size: 14px; color: #ffcc00; margin-top: 5px; font-style: italic; }

    .controls { background: #172235; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button, input[type="file"], select { background: #2a3a55; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
    input[type="range"] { width: 100%; margin-top: 10px; }
    .label { font-size: 11px; opacity: 0.7; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <h2>Fribatunneli AI - Tekniikkakorjaus</h2>
  <input type="file" id="upload" accept="video/*">

  <div id="canvas-container">
    <video id="video-input" playsinline muted></video>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button id="btn-play">PLAY</button>
      <button id="btn-pause">PAUSE</button>
      <button id="btn-stop">RESET</button>
      <select id="speed-select">
        <option value="0.2">0.2x (Suositus)</option>
        <option value="0.05">0.05x (Frame kerrallaan)</option>
        <option value="1">1x</option>
      </select>
    </div>
    <input type="range" id="seek-bar" value="0" step="0.1">
  </div>

  <div class="ui-panel">
    <div id="nose-up-box" class="stat-box">
      <span class="label">Kiekon asento (Takareuna)</span>
      <span id="nose-status" class="stat-value">Etsitään heittoa...</span>
      <div id="nose-instruction" class="instruction"></div>
    </div>

    <div class="stat-box">
      <span class="label">Ranteen ja kyynärpään suhde</span>
      <span id="wrist-angle-status" class="stat-value">OK</span>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video-input');
const canvas = document.getElementById('output-canvas');
const upload = document.getElementById('upload');
const speedSelect = document.getElementById('speed-select');
const seekBar = document.getElementById('seek-bar');

const noseStatus = document.getElementById('nose-status');
const noseInstruction = document.getElementById('nose-instruction');
const noseBox = document.getElementById('nose-up-box');
const wristStatus = document.getElementById('wrist-angle-status');

const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');

const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults((results) => {
  const canvasCtx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00aaff', lineWidth: 4});
    
    const s = results.poseLandmarks[12]; // Olkapää
    const e = results.poseLandmarks[14]; // Kyynärpää
    const w = results.poseLandmarks[16]; // Ranne

    if (s && e && w) {
      // VIRHEEN TUNNISTUS: Takareunan putoaminen (Nose Up)
      // Kun ranne (w) on ylempänä kuin kyynärpää (e) vedon aikana,
      // takareuna putoaa ja kiekko nousee pystyyn.
      const wristElbowDiff = e.y - w.y;

      if (wristElbowDiff > 0.05) {
        noseStatus.innerText = "VIRHE: TAKAREUNA ALHAALLA";
        noseBox.classList.add('warning');
        noseInstruction.innerText = "KORJAUS: Pidä ranne kyynärpään alapuolella tai samalla tasolla koko vedon ajan. Paina peukalolla kiekon etureunaa alas.";
        wristStatus.innerText = "RANNE LIIAN KORKEALLA";
      } else {
        noseStatus.innerText = "KIEKON ASENTO OK";
        noseBox.classList.remove('warning');
        noseInstruction.innerText = "";
        wristStatus.innerText = "OK";
      }
    }
  }
  canvasCtx.restore();
});

upload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    video.src = URL.createObjectURL(file);
    video.onloadedmetadata = () => { seekBar.max = video.duration; };
    video.playbackRate = parseFloat(speedSelect.value);
  }
});

btnPlay.addEventListener('click', () => video.play());
btnPause.addEventListener('click', () => video.pause());
btnStop.addEventListener('click', () => { video.pause(); video.currentTime = 0; });
speedSelect.addEventListener('change', (e) => { video.playbackRate = parseFloat(e.target.value); });
video.addEventListener('timeupdate', () => { seekBar.value = video.currentTime; });
seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });

async function run() {
  if (!video.paused || video.readyState > 2) await pose.send({image: video});
  requestAnimationFrame(run);
}
run();
</script>
</body>
</html>
