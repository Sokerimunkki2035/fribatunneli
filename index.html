<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fribatunneli AI - Forehand Analysaattori</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { font-family: sans-serif; background: #0b0f14; color: #e9eef5; margin: 0; padding: 20px; text-align: center; }
    .container { max-width: 800px; margin: auto; }
    
    #canvas-container { position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-top: 20px; }
    canvas { width: 100%; display: block; }
    video { display: none; } /* Piilotetaan raakavideo */

    .ui-panel { background: #172235; padding: 20px; border-radius: 15px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .stat-box { background: #0f1722; padding: 15px; border-radius: 10px; border: 1px solid #2a3a55; }
    .stat-value { font-size: 24px; font-weight: bold; color: #00aaff; display: block; }
    .warning { color: #ff4444 !important; }

    .controls { margin: 20px 0; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    button, input[type="file"], select { background: #2a3a55; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #3a4a65; }
    
    .label { font-size: 12px; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px; display: block; }
  </style>
</head>
<body>

<div class="container">
  <h1>Fribatunneli AI</h1>
  <p>Lataa hidastusvideo analysoitavaksi</p>

  <div class="controls">
    <input type="file" id="upload" accept="video/*">
    <select id="speed-select">
      <option value="1">Normaali nopeus</option>
      <option value="0.5">0.5x Hidastus</option>
      <option value="0.2">0.2x Super-hidastus</option>
      <option value="0.1">0.1x Frame-by-frame</option>
    </select>
  </div>

  <div id="canvas-container">
    <video id="video-input" playsinline muted></video>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="ui-panel">
    <div class="stat-box">
      <span class="label">Kyynärkulma</span>
      <span id="angle-out" class="stat-value">0°</span>
    </div>
    <div id="wrist-card" class="stat-box">
      <span class="label">Ranteen asento</span>
      <span id="status-out" class="stat-value">ODOTTAA</span>
    </div>
  </div>

  <p style="font-size: 13px; color: #888; margin-top: 20px;">
    Tekoäly analysoi oikean käden (olkapää, kyynärpää, ranne). <br>
    Jos ranne nousee kyynärpään yläpuolelle irrotuksessa, järjestelmä varoittaa.
  </p>
</div>

<script>
const video = document.getElementById('video-input');
const canvas = document.getElementById('output-canvas');
const ctx = canvas.getContext('2d');
const upload = document.getElementById('upload');
const speedSelect = document.getElementById('speed-select');
const angleOut = document.getElementById('angle-out');
const statusOut = document.getElementById('status-out');

// MediaPipe Pose asetukset
const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

function findAngle(p1, p2, p3) {
  const radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
  let angle = Math.abs(radians * 180.0 / Math.PI);
  if (angle > 180.0) angle = 360 - angle;
  return angle;
}

pose.onResults((results) => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    // Piirretään luuranko
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00aaff', lineWidth: 4});
    drawLandmarks(ctx, results.poseLandmarks, {color: '#ff4444', lineWidth: 1, radius: 3});

    const shoulder = results.poseLandmarks[12];
    const elbow = results.poseLandmarks[14];
    const wrist = results.poseLandmarks[16];

    if (shoulder && elbow && wrist) {
      const angle = findAngle(shoulder, elbow, wrist);
      angleOut.innerText = Math.round(angle) + "°";

      // Kämmenheiton virheen tunnistus (Palm Roll)
      // Jos ranne (y-koordinaatti) on merkittävästi ylempänä kuin kyynärpää
      if (wrist.y < elbow.y - 0.03) {
        statusOut.innerText = "VIRHE: PALM ROLL";
        statusOut.classList.add('warning');
      } else {
        statusOut.innerText = "OK";
        statusOut.classList.remove('warning');
      }
    }
  }
  ctx.restore();
});

// Videon lataus
upload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    video.src = URL.createObjectURL(file);
    video.load();
    video.play();
  }
});

// Toistonopeuden säätö
speedSelect.addEventListener('change', (e) => {
  video.playbackRate = parseFloat(e.target.value);
});

// Jatkuva analyysisilmukka
async function detect() {
  if (!video.paused && !video.ended) {
    await pose.send({image: video});
  }
  requestAnimationFrame(detect);
}

video.addEventListener('play', () => {
  detect();
});
</script>
</body>
</html>
