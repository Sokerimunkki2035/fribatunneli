<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fribatunneli AI - Forehand Analysaattori</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { font-family: sans-serif; background: #0b0f14; color: #e9eef5; margin: 0; padding: 10px; text-align: center; }
    .container { max-width: 800px; margin: auto; }
    
    #canvas-container { position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-top: 10px; }
    canvas { width: 100%; display: block; }
    video { display: none; } 

    .ui-panel { background: #172235; padding: 15px; border-radius: 15px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: #0f1722; padding: 10px; border-radius: 10px; border: 1px solid #2a3a55; }
    .stat-value { font-size: 22px; font-weight: bold; color: #00aaff; display: block; }
    .warning { color: #ff4444 !important; }

    .controls { background: #172235; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    
    button, input[type="file"], select { background: #2a3a55; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #3a4a65; }
    
    input[type="range"] { width: 100%; margin-top: 10px; cursor: pointer; }
    .label { font-size: 11px; opacity: 0.7; text-transform: uppercase; margin-bottom: 3px; display: block; }
  </style>
</head>
<body>

<div class="container">
  <h3>Fribatunneli AI</h3>
  
  <input type="file" id="upload" accept="video/*">

  <div id="canvas-container">
    <video id="video-input" playsinline muted></video>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button id="btn-play">PLAY</button>
      <button id="btn-pause">PAUSE</button>
      <button id="btn-stop">STOP / RESET</button>
    </div>
    
    <div class="btn-row">
      <select id="speed-select">
        <option value="1">Nopeus: 1x</option>
        <option value="0.5">Nopeus: 0.5x</option>
        <option value="0.2">Nopeus: 0.2x</option>
        <option value="0.05">Nopeus: 0.05x</option>
      </select>
    </div>

    <input type="range" id="seek-bar" value="0" step="0.1">
    <span class="label">Kelaa videota</span>
  </div>

  <div class="ui-panel">
    <div class="stat-box">
      <span class="label">Kyynärkulma</span>
      <span id="angle-out" class="stat-value">0°</span>
    </div>
    <div id="wrist-card" class="stat-box">
      <span class="label">Ranteen asento</span>
      <span id="status-out" class="stat-value">ODOTTAA</span>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video-input');
const canvas = document.getElementById('output-canvas');
const ctx = canvas.width > 0 ? canvas.getContext('2d') : null;
const upload = document.getElementById('upload');
const speedSelect = document.getElementById('speed-select');
const seekBar = document.getElementById('seek-bar');
const angleOut = document.getElementById('angle-out');
const statusOut = document.getElementById('status-out');

const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');

const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

function findAngle(p1, p2, p3) {
  const radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
  let angle = Math.abs(radians * 180.0 / Math.PI);
  if (angle > 180.0) angle = 360 - angle;
  return angle;
}

pose.onResults((results) => {
  const canvasCtx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00aaff', lineWidth: 4});
    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ff4444', lineWidth: 1, radius: 3});

    const shoulder = results.poseLandmarks[12];
    const elbow = results.poseLandmarks[14];
    const wrist = results.poseLandmarks[16];

    if (shoulder && elbow && wrist) {
      const angle = findAngle(shoulder, elbow, wrist);
      angleOut.innerText = Math.round(angle) + "°";

      if (wrist.y < elbow.y - 0.03) {
        statusOut.innerText = "VIRHE: PALM ROLL";
        statusOut.classList.add('warning');
      } else {
        statusOut.innerText = "OK";
        statusOut.classList.remove('warning');
      }
    }
  }
  canvasCtx.restore();
});

upload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    video.src = URL.createObjectURL(file);
    video.load();
    video.onloadedmetadata = () => {
      seekBar.max = video.duration;
    };
  }
});

btnPlay.addEventListener('click', () => video.play());
btnPause.addEventListener('click', () => video.pause());
btnStop.addEventListener('click', () => {
  video.pause();
  video.currentTime = 0;
});

speedSelect.addEventListener('change', (e) => {
  video.playbackRate = parseFloat(e.target.value);
});

video.addEventListener('timeupdate', () => {
  seekBar.value = video.currentTime;
});

seekBar.addEventListener('input', () => {
  video.currentTime = seekBar.value;
});

async function runAnalysis() {
  if (!video.paused || video.readyState > 2) {
    await pose.send({image: video});
  }
  requestAnimationFrame(runAnalysis);
}

runAnalysis();
</script>
</body>
</html>
